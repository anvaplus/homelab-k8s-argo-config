---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: routes
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: ""
    namespace: traefik
    server: https://kubernetes.default.svc
  project: argo-config
  sources:
    - repoURL: https://github.com/anvaplus/homelab-k8s-argo-config
      path: environments/dev/ingress/routes/http-routes/
      targetRevision: HEAD
    - repoURL: https://github.com/anvaplus/homelab-k8s-argo-config
      path: environments/dev/ingress/routes/cloudflare-public-routes/
      targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
